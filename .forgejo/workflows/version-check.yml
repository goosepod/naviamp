name: Version check

on:
  pull_request:
    branches:
      - main
  push:
    branches-ignore:
      - main

permissions:
  contents: read

jobs:
  version:
    name: Version files
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch main
        run: git fetch origin main

      - name: Validate version files
        run: scripts/validate-version.sh

      - name: Require version bump from main
        run: scripts/check-version-bump.sh origin/main
